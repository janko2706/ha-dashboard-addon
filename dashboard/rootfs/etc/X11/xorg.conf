Section "ServerFlags"
    # Prevent VT switching and Ctrl+Alt+Backspace kill
    Option "DontVTSwitch" "true"
    Option "DontZap"      "true"
EndSection

Section "Device"
    Identifier "Card0"
    Driver     "fbdev"
    Option     "fbdev" "/dev/fb0"
EndSection

Section "Screen"
    Identifier    "Screen0"
    Device        "Card0"
    DefaultDepth  24
    SubSection "Display"
        Depth  24
        Modes  "1920x1080"
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen     "Screen0"
EndSection

Section "Extensions"
    # Keep display always on — no blanking on an always-on status screen
    Option "DPMS" "Disable"
EndSection
