Section "ServerFlags"
    Option "DontVTSwitch" "true"
    Option "DontZap"      "true"
EndSection

Section "Device"
    Identifier "Card0"
    Driver     "fbdev"
    Option     "fbdev" "/dev/fb0"
EndSection

Section "Screen"
    Identifier   "Screen0"
    Device       "Card0"
    DefaultDepth 16
    DefaultFbBpp 16
    SubSection "Display"
        Depth 16
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen     "Screen0"
EndSection

Section "Extensions"
    Option "DPMS" "Disable"
EndSection
