Section "ServerFlags"
    Option "DontVTSwitch" "true"
    Option "DontZap"      "true"
EndSection

Section "Device"
    Identifier "Card0"
    Driver     "modesetting"
    Option     "kmsdev"       "/dev/dri/card0"
    Option     "AccelMethod"  "none"
EndSection

Section "Screen"
    Identifier    "Screen0"
    Device        "Card0"
    DefaultDepth  24
    SubSection "Display"
        Depth  24
        Modes  "1920x1080"
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen     "Screen0"
EndSection

Section "Extensions"
    Option "DPMS" "Disable"
EndSection
